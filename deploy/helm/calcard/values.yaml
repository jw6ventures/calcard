image:
  repository: ghcr.io/jw6ventures/calcard
  tag: "" # Defaults to the chart appVersion when unset.
  pullPolicy: IfNotPresent

nameOverride: "" # Overrides the chart name used for resource names/labels.
fullnameOverride: "" # Overrides the full resource name (takes precedence over nameOverride).

replicaCount: 1 # HA is theoretically possible, but untested at this point. Recommend 1 until the release notes say otherwise.

app:
  baseUrl: "http://localhost:8080"
  trustedProxies: ""
  oauth:
    clientId: "" # OAuth Client ID
    clientSecret: "" # OAuth Client Secret - Plain Text
    clientSecretExistingSecret: # Secret for storing the OAuth Client Secret
      name: ""
      key: "APP_OAUTH_CLIENT_SECRET" # OAuth Client Secret
    issuerUrl: "" # OAuth Issuer URL
    discoveryUrl: "" # OAuth Client Discovery URL
  sessionSecret: ""
  sessionSecretExistingSecret:
    name: ""
    key: "APP_SESSION_SECRET"
  db:
    host: ""
    port: 5432
    name: "app"
    user: "postgres"
    password: ""
    sslmode: "disable"
    existingSecret:
      name: ""
      dsnKey: "APP_DB_DSN"
      userKey: "APP_DB_USER"
      passwordKey: "APP_DB_PASSWORD"

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  className: ""
  host: ""
  annotations: {}
  tls:
    enabled: true
    secretName: ""

postgres:
  enabled: false
  image: postgres:16
  persistence:
    enabled: true
    size: 500Mi
    storageClassName: ""
  resources: {}

resources: {}
nodeSelector: {}
tolerations: []
affinity: {}
