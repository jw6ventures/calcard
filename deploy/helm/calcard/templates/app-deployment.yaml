{{- $name := default .Chart.Name .Values.nameOverride | trunc 63 | trimSuffix "-" -}}
{{- $fullname := (default $name .Values.fullnameOverride) | trunc 63 | trimSuffix "-" -}}
{{- $dbSecret := default (printf "%s-db-secret" $fullname) .Values.app.db.existingSecret.name -}}
{{- $imageTag := default .Chart.AppVersion .Values.image.tag -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $fullname }}
  labels:
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
    app.kubernetes.io/name: {{ $name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $name }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ $name }}
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: calcard
          image: "{{ .Values.image.repository }}:{{ $imageTag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: APP_DB_DSN
              valueFrom:
                secretKeyRef:
                  name: {{ $dbSecret | quote }}
                  key: {{ .Values.app.db.existingSecret.dsnKey | quote }}
            - name: APP_DB_USER
              valueFrom:
                secretKeyRef:
                  name: {{ $dbSecret | quote }}
                  key: {{ .Values.app.db.existingSecret.userKey | quote }}
            - name: APP_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $dbSecret | quote }}
                  key: {{ .Values.app.db.existingSecret.passwordKey | quote }}
            {{- if .Values.app.oauth.clientSecretExistingSecret.name }}
            - name: APP_OAUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.app.oauth.clientSecretExistingSecret.name | quote }}
                  key: {{ .Values.app.oauth.clientSecretExistingSecret.key | quote }}
            {{- end }}
            {{- if .Values.app.sessionSecretExistingSecret.name }}
            - name: APP_SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.app.sessionSecretExistingSecret.name | quote }}
                  key: {{ .Values.app.sessionSecretExistingSecret.key | quote }}
            {{- end }}
          envFrom:
            - configMapRef:
                name: {{ $fullname }}-config
            - secretRef:
                name: {{ $fullname }}-secret
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 6
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
