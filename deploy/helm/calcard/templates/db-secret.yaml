{{- if not .Values.app.db.existingSecret.name }}
{{- $name := default .Chart.Name .Values.nameOverride | trunc 63 | trimSuffix "-" -}}
{{- $fullname := (default $name .Values.fullnameOverride) | trunc 63 | trimSuffix "-" -}}
{{- $dbHost := "" -}}
{{- if .Values.postgres.enabled -}}
{{- if .Values.app.db.host -}}
{{- $dbHost = .Values.app.db.host -}}
{{- else -}}
{{- $dbHost = printf "%s-postgres" $fullname -}}
{{- end -}}
{{- else -}}
{{- $dbHost = required "app.db.host is required when postgres.enabled is false" .Values.app.db.host -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $fullname }}-db-secret
  labels:
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
    app.kubernetes.io/name: {{ $name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
type: Opaque
stringData:
  {{ .Values.app.db.existingSecret.dsnKey }}: {{ printf "postgres://%s:%s@%s:%d/%s?sslmode=%s" .Values.app.db.user .Values.app.db.password $dbHost (int .Values.app.db.port) .Values.app.db.name .Values.app.db.sslmode | quote }}
  {{ .Values.app.db.existingSecret.userKey }}: {{ .Values.app.db.user | quote }}
  {{ .Values.app.db.existingSecret.passwordKey }}: {{ .Values.app.db.password | quote }}
  POSTGRES_PASSWORD: {{ .Values.app.db.password | quote }}
{{- end }}
